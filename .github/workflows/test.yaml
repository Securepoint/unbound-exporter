name: test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  GO111MODULE: "auto"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go
